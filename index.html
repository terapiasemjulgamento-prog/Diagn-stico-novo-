<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnóstico de Padrões — Hipnoterapia Online</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..900&family=Inter:wght@400;500;600;700&display=swap');

  :root{
    --bg: #16141C;
    --bg-soft: #1E1B26;
    --surface: #262230;
    --surface-2: #2E2A3A;
    --text: #F4EFEA;
    --text-muted: #A39AAE;
    --border: rgba(244,239,234,0.10);
    --copper: #E2A35C;
    --rose: #C97B6E;
    --sage: #8AA08A;
    --max: 640px;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }
  html{ scroll-behavior: smooth; }

  body{
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  .container{ max-width: var(--max); margin: 0 auto; padding: 0 36px; width: 100%; }

  @media (min-width: 480px){
    .container{ padding: 0 44px; }
  }

  /* Header */
  .site-header{ padding: 32px 36px 0; max-width: var(--max); margin: 0 auto; }

  @media (min-width: 480px){
    .site-header{ padding: 32px 44px 0; }
  }
  .wordmark{
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 1.05rem;
    letter-spacing: 0.18em;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .wordmark-sub{
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    letter-spacing: 0.06em;
    font-size: 0.7rem;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  /* Hero */
  .hero{ position: relative; padding: 56px 0 64px; overflow: hidden; }
  .hero-spiral{
    position: absolute; top: -60px; right: -120px;
    width: 360px; height: 360px; opacity: 0.5; pointer-events: none;
  }
  .hero-spiral svg{ width:100%; height:100%; }
  .hero-spiral path{ fill: none; stroke: var(--copper); stroke-width: 1.2; stroke-linecap: round; }
  .hero-spiral circle.dot{ fill: var(--rose); }
  .hero-content{ position: relative; z-index: 1; }

  h1{
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: clamp(2rem, 8vw, 2.6rem);
    line-height: 1.18;
    letter-spacing: -0.01em;
    max-width: 11ch;
  }
  h1 .accent{
    font-style: italic;
    font-weight: 600;
    background: linear-gradient(100deg, var(--copper), var(--rose));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .tags{ display: flex; flex-wrap: wrap; gap: 10px; margin: 28px 0 24px; }
  .tag{
    display: inline-flex; align-items: center; gap: 8px;
    padding: 7px 14px; border-radius: 100px;
    font-size: 0.8rem; font-weight: 500; letter-spacing: 0.02em;
  }
  .tag::before{ content: ''; width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
  .tag-rose{ background: rgba(201,123,110,0.12); color: var(--rose); }
  .tag-rose::before{ background: var(--rose); }
  .tag-sage{ background: rgba(138,160,138,0.12); color: var(--sage); }
  .tag-sage::before{ background: var(--sage); }
  .tag-copper{ background: rgba(226,163,92,0.12); color: var(--copper); }
  .tag-copper::before{ background: var(--copper); }

  .lede{ color: var(--text-muted); font-size: 1.02rem; max-width: 38ch; margin-bottom: 24px; }

  /* Disclaimer banner */
  .disclaimer-banner{
    border-left: 3px solid var(--rose);
    background: rgba(201,123,110,0.07);
    padding: 14px 16px;
    border-radius: 0 10px 10px 0;
    font-size: 0.85rem;
    color: var(--text-muted);
    max-width: 44ch;
    margin-bottom: 28px;
  }
  .disclaimer-banner strong{ color: var(--text); }

  .btn-primary, .btn-secondary{
    appearance: none; border: none; cursor: pointer;
    font-family: 'Inter', sans-serif; font-weight: 700; font-size: 1rem;
    padding: 16px 28px; border-radius: 100px; width: 100%; max-width: 360px;
    transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    text-align: center; text-decoration: none;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .btn-primary{
    background: linear-gradient(100deg, var(--copper), var(--rose));
    color: #1B1620;
  }
  .btn-primary:hover{ transform: translateY(-1px); box-shadow: 0 8px 24px rgba(226,163,92,0.25); }
  .btn-secondary{
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover{ border-color: var(--copper); }
  .btn-primary:active, .btn-secondary:active{ transform: translateY(0); }
  .btn-primary:focus-visible, .btn-secondary:focus-visible{ outline: 2px solid var(--copper); outline-offset: 3px; }

  .microcopy{ margin-top: 14px; font-size: 0.8rem; color: var(--text-muted); letter-spacing: 0.04em; }

  .divider{ height: 1px; background: var(--border); }

  /* Generic section heading bits */
  .eyebrow{
    font-size: 0.8rem; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--copper); margin-bottom: 10px;
  }
  section h2{
    font-family: 'Fraunces', serif; font-weight: 500;
    font-size: clamp(1.5rem, 6vw, 2rem); line-height: 1.3; margin-bottom: 22px; max-width: 22ch;
  }

  /* Preview of patterns */
  .preview{ padding: 56px 0 48px; }
  .preview-grid{ display: flex; flex-direction: column; gap: 12px; margin-bottom: 32px; }
  .preview-card{
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    padding: 16px 18px;
  }
  .preview-card h3{
    font-family: 'Fraunces', serif; font-weight: 500; font-size: 1.02rem; margin-bottom: 6px;
  }
  .preview-card p{ color: var(--text-muted); font-size: 0.88rem; }

  /* Intake form */
  .intake{ padding: 8px 0 64px; }
  .intake > p.lede{ margin-bottom: 28px; }
  #intakeForm, #leadForm{ display: flex; flex-direction: column; gap: 12px; max-width: 420px; }
  #intakeForm input, #leadForm input{
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    font-family: 'Inter', sans-serif; font-size: 0.95rem; padding: 14px 16px; border-radius: 10px;
  }
  #intakeForm input::placeholder, #leadForm input::placeholder{ color: var(--text-muted); }
  #intakeForm input:focus-visible, #leadForm input:focus-visible{ outline: 2px solid var(--copper); outline-offset: 2px; }
  #intakeForm .btn-primary{ margin-top: 6px; }
  .form-error{ color: var(--rose); font-size: 0.85rem; display: none; }
  .form-error.visible{ display: block; }

  /* Quiz */
  .quiz{ padding: 8px 0 72px; }
  .progress{ height: 4px; background: var(--surface); border-radius: 100px; overflow: hidden; margin-bottom: 36px; }
  .progress-bar{ height: 100%; width: 0%; background: linear-gradient(100deg, var(--copper), var(--rose)); transition: width 0.4s ease; }
  .question-eyebrow{ font-size: 0.8rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; }
  .question-text{ font-family: 'Fraunces', serif; font-weight: 500; font-size: clamp(1.3rem, 5vw, 1.6rem); line-height: 1.35; margin-bottom: 28px; }
  .options{ display: flex; flex-direction: column; gap: 10px; }
  .option{
    text-align: left; background: var(--surface); border: 1px solid var(--border); color: var(--text);
    font-family: 'Inter', sans-serif; font-size: 0.96rem; padding: 16px 18px; border-radius: 14px; cursor: pointer;
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  .option:hover{ border-color: var(--copper); background: var(--surface-2); }
  .option:focus-visible{ outline: 2px solid var(--copper); outline-offset: 2px; }
  .option.selected{ border-color: var(--rose); background: var(--surface-2); }
  .quiz-fade{ animation: fadeIn 0.35s ease; }
  @keyframes fadeIn{ from{ opacity: 0; transform: translateY(6px); } to{ opacity: 1; transform: translateY(0); } }

  /* Result */
  .result{ padding: 8px 0 72px; }
  .result-name{ color: var(--text-muted); font-size: 0.95rem; margin-bottom: 4px; }
  .result h2{ margin-bottom: 22px; }
  .result-body p{ color: var(--text-muted); margin-bottom: 16px; max-width: 42ch; }
  .result-disclaimer{
    margin-top: 28px; font-size: 0.8rem; color: var(--text-muted); max-width: 46ch;
  }
  .result-next{
    margin-top: 28px; padding: 20px 22px;
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    border-left: 3px solid var(--copper);
  }
  .result-next h3{
    font-family: 'Fraunces', serif; font-weight: 500; font-size: 1.05rem;
    color: var(--copper); margin-bottom: 10px;
  }
  .result-next p{ color: var(--text); font-size: 0.92rem; max-width: 46ch; }

  /* Footer */
  footer{ padding: 40px 0 48px; border-top: 1px solid var(--border); }
  .disclaimer{ color: var(--text-muted); font-size: 0.78rem; max-width: 50ch; margin-bottom: 14px; }
  .credit{ font-family: 'Fraunces', serif; font-size: 0.85rem; letter-spacing: 0.04em; color: var(--text-muted); }

  /* Admin */
  .admin-table{ width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-top: 24px; }
  .admin-table th, .admin-table td{ text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); word-break: break-word; }
  .admin-table th{ color: var(--text-muted); font-weight: 500; }

  [hidden]{ display: none !important; }

  @media (prefers-reduced-motion: reduce){
    html{ scroll-behavior: auto; }
    .quiz-fade{ animation: none; }
    .hero-spiral .dot{ animation: none !important; }
    .hero-spiral path{ stroke-dashoffset: 0 !important; transition: none !important; }
  }
</style>
</head>
<body>

  <header class="site-header">
    <div class="wordmark">SIZILIO
      <span class="wordmark-sub">Hipnoterapia Online</span>
    </div>
  </header>

  <main>
    <!-- HERO -->
    <section
